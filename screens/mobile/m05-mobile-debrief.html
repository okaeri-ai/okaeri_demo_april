<div style="padding:16px;min-height:100%">
  <div style="font-size:9px;font-weight:200;color:var(--green);letter-spacing:0.36em;text-transform:uppercase;text-align:center;margin-top:20px">meeting ended</div>
  <div style="font-size:18px;font-weight:200;color:var(--ink);letter-spacing:0.02em;text-align:center;margin-top:6px">Q2 roadmap sync</div>
  <div style="font-size:9px;font-weight:200;color:var(--ink3);letter-spacing:0.14em;text-align:center;margin-top:4px">38 min &middot; 4 commitments</div>

  <!-- Play debrief -->
  <div style="display:flex;justify-content:center;margin:16px 0">
    <div id="m5PlayBtn" style="width:48px;height:48px;border-radius:50%;border:0.5px solid var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer">
      <svg id="m5PlayIcon" width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1.5 1.5l9 5.5-9 5.5V1.5z" fill="#888"/></svg>
    </div>
  </div>
  <div style="font-size:10px;font-weight:200;color:var(--ink3);letter-spacing:0.18em;text-align:center;margin-bottom:16px">hear debrief &middot; 22 sec</div>

  <!-- Commitments -->
  <div style="font-size:9px;font-weight:200;color:var(--ink3);letter-spacing:0.28em;text-transform:uppercase;margin-bottom:6px">commitments</div>
  <div style="padding:6px 0;border-bottom:0.5px solid var(--rule2);border-top:0.5px solid var(--rule2);font-size:11px;font-weight:300;color:var(--ink);letter-spacing:0.02em">create &rarr; API rate limit bug &rarr; Linear</div>
  <div style="padding:6px 0;border-bottom:0.5px solid var(--rule2);font-size:11px;font-weight:300;color:var(--ink);letter-spacing:0.02em">send &rarr; pricing recap &rarr; Slack</div>
  <div style="padding:6px 0;border-bottom:0.5px solid var(--rule2);font-size:11px;font-weight:300;color:var(--ink);letter-spacing:0.02em">schedule &rarr; Andreessen &rarr; Calendar</div>
  <div style="padding:6px 0;border-bottom:0.5px solid var(--rule2);font-size:11px;font-weight:300;color:var(--ink);letter-spacing:0.02em">update &rarr; Acme deal &rarr; Salesforce</div>

  <!-- Action -->
  <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;padding-bottom:20px">
    <button class="btn-ul-g" style="font-size:10px;display:block;text-align:center" onclick="if(window.OKAERI_NAV){OKAERI_NAV.setView('desktop');OKAERI.go('d04-confirm-execute');}">review on desktop</button>
    <button class="btn-ghost" style="font-size:10px;text-align:center" onclick="OKAERI.go('m01-capture')">start new capture</button>
  </div>
</div>

<script>
(function(){
  var debriefText = "Q2 roadmap sync wrapped up. 38 minutes, 4 commitments extracted. Marcus owns the API rate limit bug in Linear. Priya will send the pricing recap to Slack sales channel. James is scheduling the Andreessen follow-up. And the Acme deal stage is being updated in Salesforce. All ready for your review.";

  var playBtn = document.getElementById('m5PlayBtn');
  var playing = false;
  var isPaused = false;

  var pauseSvg = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><rect x="2" y="1.5" width="3" height="11" rx="0.5" fill="#888"/><rect x="7" y="1.5" width="3" height="11" rx="0.5" fill="#888"/></svg>';
  var playSvg = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1.5 1.5l9 5.5-9 5.5V1.5z" fill="#888"/></svg>';

  playBtn.addEventListener('click', function() {
    if (playing && !isPaused) {
      // Pause
      if (window.OKAERI && OKAERI.pauseSpeech) OKAERI.pauseSpeech();
      isPaused = true;
      playBtn.innerHTML = playSvg;
      playBtn.style.borderColor = 'var(--ink2)';
      return;
    }
    if (playing && isPaused) {
      // Resume
      if (window.OKAERI && OKAERI.resumeSpeech) OKAERI.resumeSpeech();
      isPaused = false;
      playBtn.innerHTML = pauseSvg;
      playBtn.style.borderColor = 'var(--green)';
      return;
    }
    // Start
    playing = true;
    isPaused = false;
    playBtn.innerHTML = pauseSvg;
    playBtn.style.borderColor = 'var(--green)';
    if (window.OKAERI && window.OKAERI.speak) {
      window.OKAERI.speak(debriefText, {
        onEnd: function() {
          playing = false;
          isPaused = false;
          playBtn.innerHTML = playSvg;
          playBtn.style.borderColor = 'var(--ink2)';
        }
      });
    }
  });
})();
</script>
