<script>
(function(){
  var sec = 12;
  var el = document.getElementById('capDuration');
  setInterval(function(){
    sec++;
    var m = Math.floor(sec/60);
    var s = sec%60;
    el.textContent = m+':'+(s<10?'0':'')+s;
  }, 1000);
})();
</script>
