<div style="margin-bottom:16px">
  <div class="ptitle">team</div>

</div>

</div>

<!-- Team summary -->
<div data-tm-total style="display:grid;grid-template-columns:180px 60px 60px 70px 60px 1fr;padding:14px 0;border-top:0.5px solid var(--rule);margin-top:4px;align-items:center">
  <div style="font-size:10px;font-weight:200;color:var(--ink3);letter-spacing:0.22em;text-transform:uppercase">team total</div>
  <div data-tm-col="open" style="font-size:13px;font-weight:200;color:var(--ink);letter-spacing:0.02em">9</div>
  <div data-tm-col="done" style="font-size:13px;font-weight:200;color:var(--green);letter-spacing:0.02em">75</div>
  <div data-tm-col="pending" style="font-size:13px;font-weight:200;color:var(--ink3);letter-spacing:0.02em">3</div>
  <div data-tm-col="rate" style="font-size:13px;font-weight:200;color:var(--green);letter-spacing:0.02em">94%</div>
  <div></div>
</div>

<script>
(function(){
  var tabs = document.querySelectorAll('.tm-tab');
  var data = {
    today:  { jess:[0,6,0,'100%',100], marcus:[1,3,0,'92%',92], priya:[0,4,0,'100%',100], james:[1,2,1,'89%',89], total:[2,15,1,'93%'] },
    week:   { jess:[2,31,0,'97%',97], marcus:[3,18,1,'92%',92], priya:[1,14,0,'100%',100], james:[3,12,2,'89%',89], total:[9,75,3,'94%'] },
    month:  { jess:[2,31,0,'97%',97], marcus:[3,18,1,'92%',92], priya:[1,14,0,'100%',100], james:[3,12,2,'89%',89], total:[9,75,3,'94%'] }
  };

  function colorForRate(r){ return r>=95?'var(--green)':r>=90?'var(--green)':'var(--ink)'; }
  function colorForOpen(n){ return 'var(--ink)'; }
  function colorForDone(n){ return 'var(--green)'; }
  function colorForPend(n){ return n>0?'var(--ink3)':'var(--ink3)'; }

  function update(period){
    var d = data[period];
    var rows = document.querySelectorAll('[data-tm-person]');
    rows.forEach(function(row){
      var p = row.getAttribute('data-tm-person');
      var vals = d[p];
      if(!vals) return;
      var cells = row.querySelectorAll('[data-tm-col]');
      cells.forEach(function(cell){
        var col = cell.getAttribute('data-tm-col');
        if(col==='open'){ cell.textContent=vals[0]; cell.style.color=colorForOpen(vals[0]); }
        if(col==='done'){ cell.textContent=vals[1]; cell.style.color=colorForDone(vals[1]); }
        if(col==='pending'){ cell.textContent=vals[2]; cell.style.color=colorForPend(vals[2]); }
        if(col==='rate'){ cell.textContent=vals[3]; cell.style.color=colorForRate(vals[4]); }
      });
      var bar = row.querySelector('[data-tm-bar]');
      if(bar) bar.style.width=vals[4]+'%';
    });
    // update totals
    var totalRow = document.querySelector('[data-tm-total]');
    if(totalRow){
      var tc = totalRow.querySelectorAll('[data-tm-col]');
      tc.forEach(function(cell){
        var col = cell.getAttribute('data-tm-col');
        if(col==='open') cell.textContent=d.total[0];
        if(col==='done') cell.textContent=d.total[1];
        if(col==='pending') cell.textContent=d.total[2];
        if(col==='rate') cell.textContent=d.total[3];
      });
    }
  }

  tabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      tabs.forEach(function(t){ t.style.borderBottom='none'; t.style.color=''; t.classList.remove('active'); });
      tab.style.borderBottom='0.5px solid var(--ink)'; tab.style.color='var(--ink)'; tab.classList.add('active');
      update(tab.getAttribute('data-period'));
    });
  });
})();
</script>
