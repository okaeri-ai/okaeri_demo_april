<div class="eyebrow">memory layer · search across all meetings</div>
<div class="ptitle" style="margin-bottom:16px">ask okaeri</div>

<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px">
  <button class="sug" data-q="what did we decide about go-to-market?">what did we decide about go-to-market?</button>
  <button class="sug" data-q="what is Marcus working on?">what is Marcus working on?</button>
  <button class="sug" data-q="what slipped last week?">what slipped last week?</button>
  <button class="sug" data-q="show me everything about Acme">show me everything about Acme</button>
  <button class="sug" data-q="how is the fundraise going?">how is the fundraise going?</button>
  <button class="sug" data-q="what's the status of the Resonance partnership?">what's the status of the Resonance partnership?</button>
  <button class="sug" data-q="who needs follow-up?">who needs follow-up?</button>
  <button class="sug" data-q="summarize last week">summarize last week</button>
</div>

<div class="hr"></div>

<div id="askThread">
  <div style="padding:18px 0;text-align:center;font-size:11px;font-weight:200;color:var(--ink3);letter-spacing:0.22em;background:rgba(234,243,222,0.3);border-radius:8px;padding:16px 22px">tap a question above</div>
</div>

<div class="ask-bar" style="display:flex;gap:8px;align-items:center">
  <input id="askInput" type="text" placeholder="ask anything" style="flex:1;background:transparent;border:none;outline:none;font-size:13px;font-weight:300;color:var(--ink);letter-spacing:0.02em;font-family:inherit;padding:0;line-height:1.6">
  <button id="askSendBtn" style="background:none;border:none;font-size:11px;font-weight:200;color:var(--ink3);letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;padding:4px 8px;flex-shrink:0">ask</button>
</div>

<script>
(function(){
  var thread = document.getElementById('askThread');
  var sugs = document.querySelectorAll('.sug');
  var answers = OKAERI.askAnswers;

  sugs.forEach(function(btn){
    btn.addEventListener('click', function(){
      var q = btn.getAttribute('data-q');

      // highlight selected
      sugs.forEach(function(s){ s.classList.remove('sel'); });
      btn.classList.add('sel');

      // show user question
      thread.innerHTML = '<div class="msg"><div class="msg-who"><span>you</span><span>just now</span></div><div class="msg-t u">' + q + '</div></div>';

      // show typing indicator
      var typing = document.createElement('div');
      typing.className = 'typing-row';
      typing.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
      thread.appendChild(typing);

      // show answer after delay
      setTimeout(function(){
        var a = answers[q];
        if(!a) return;

        var evHtml = '';
        if(a.evidence && a.evidence.length){
          evHtml = '<div class="ev">';
          a.evidence.forEach(function(e){
            evHtml += '<div class="ev-i" data-nav="d30-lifecycle"><span class="ev-v">' + e.verb + '</span><span class="ev-o">' + e.obj + '</span><span class="ev-s">' + e.source + '</span><span class="ev-d">' + e.date + '</span></div>';
          });
          evHtml += '</div>';
        }

        typing.remove();
        var ansDiv = document.createElement('div');
        ansDiv.className = 'msg';
        ansDiv.innerHTML = '<div class="msg-who"><span>okaeri</span><span>just now</span></div><div class="msg-t">' + a.text + '</div>' + evHtml;
        ansDiv.style.opacity = '0';
        ansDiv.style.transition = 'opacity 0.3s ease';
        thread.appendChild(ansDiv);
        requestAnimationFrame(function(){ ansDiv.style.opacity = '1'; });

        // Make evidence rows clickable — store evidence, navigate to commitment lifecycle
        ansDiv.querySelectorAll('.ev-i[data-nav]').forEach(function(row){
          row.addEventListener('click', function(){
            window.OKAERI.activeEvidence = {
              verb: this.querySelector('.ev-v').textContent,
              obj: this.querySelector('.ev-o').textContent,
              source: this.querySelector('.ev-s').textContent,
              date: this.querySelector('.ev-d').textContent
            };
            OKAERI.go(this.getAttribute('data-nav'));
          });
        });
      }, 1400);
    });
  });
})();
</script>

<style>
@keyframes sugPulse {
  0% { box-shadow: 0 0 0 0 rgba(234,243,222,0.6); }
  50% { box-shadow: 0 0 0 6px rgba(234,243,222,0); }
  100% { box-shadow: 0 0 0 0 rgba(234,243,222,0); }
}
.sug.fuzzy-match { animation: sugPulse 1.2s ease 2; }
</style>
<script>
(function(){
  var input = document.getElementById('askInput');
  var sendBtn = document.getElementById('askSendBtn');
  var sugs = document.querySelectorAll('.sug');
  var thread = document.getElementById('askThread');
  var O = window.OKAERI;
  var answers = O.askAnswers;

  if (!input) return;

  // Filter suggestions as user types
  input.addEventListener('input', function(){
    var val = input.value.toLowerCase().trim();
    if (!val) {
      sugs.forEach(function(s){ s.style.opacity = '1'; });
      return;
    }
    var words = val.split(/\s+/);
    sugs.forEach(function(s){
      var q = s.getAttribute('data-q').toLowerCase();
      var matches = words.some(function(w){ return w.length > 2 && q.indexOf(w) !== -1; });
      s.style.opacity = matches ? '1' : '0.3';
    });
  });

  function findBestAnswer(query) {
    var q = query.toLowerCase().trim();

    // Exact match first
    if (O.askAnswers[q]) return { answer: O.askAnswers[q], key: q };

    // Check all answer keys for substring containment
    var keys = Object.keys(O.askAnswers);

    // Try: does the query contain a key's important words?
    var bestMatch = null;
    var bestScore = 0;

    keys.forEach(function(key) {
      var keyWords = key.toLowerCase().replace(/[?'"]/g, '').split(/\s+/);
      var matchCount = 0;
      keyWords.forEach(function(w) {
        if (w.length > 2 && q.indexOf(w) !== -1) matchCount++;
      });
      var score = matchCount / keyWords.length;
      if (score > bestScore) { bestScore = score; bestMatch = key; }
    });

    if (bestScore > 0.3 && bestMatch) return { answer: O.askAnswers[bestMatch], key: bestMatch };

    // Pattern matching: team member names
    var teamNames = ['marcus', 'priya', 'james', 'jess', 'sarah', 'michael'];
    for (var i = 0; i < teamNames.length; i++) {
      if (q.indexOf(teamNames[i]) !== -1) {
        var aboutKey = 'tell me about ' + teamNames[i].charAt(0).toUpperCase() + teamNames[i].slice(1);
        if (O.askAnswers[aboutKey]) return { answer: O.askAnswers[aboutKey], key: aboutKey };
        // Fall back to "what is X working on" pattern
        var workingKey = keys.find(function(k) { return k.toLowerCase().indexOf(teamNames[i]) !== -1; });
        if (workingKey) return { answer: O.askAnswers[workingKey], key: workingKey };
      }
    }

    // Pattern matching: tool names
    var tools = ['linear', 'slack', 'salesforce', 'calendar', 'gmail'];
    for (var i = 0; i < tools.length; i++) {
      if (q.indexOf(tools[i]) !== -1) {
        var toolKey = keys.find(function(k) { return k.toLowerCase().indexOf(tools[i]) !== -1; });
        if (toolKey) return { answer: O.askAnswers[toolKey], key: toolKey };
      }
    }

    // Pattern matching: meeting names
    var meetings = ['q2', 'roadmap', 'sequoia', 'resonance', 'investor', 'fundraise'];
    for (var i = 0; i < meetings.length; i++) {
      if (q.indexOf(meetings[i]) !== -1) {
        var meetKey = keys.find(function(k) { return k.toLowerCase().indexOf(meetings[i]) !== -1; });
        if (meetKey) return { answer: O.askAnswers[meetKey], key: meetKey };
      }
    }

    return null; // Will trigger fallback message
  }

  function highlightClosestSuggestion(matchedKey) {
    // Find which suggestion button most closely relates to the matched answer key
    var bestSug = null;
    var bestScore = 0;
    var matchWords = matchedKey.toLowerCase().replace(/[?'"]/g, '').split(/\s+/).filter(function(w){ return w.length > 2; });

    sugs.forEach(function(s) {
      var sugQ = s.getAttribute('data-q').toLowerCase();
      // Exact match on suggestion
      if (sugQ === matchedKey.toLowerCase()) { bestSug = s; bestScore = 999; return; }
      // Word overlap scoring
      var score = 0;
      matchWords.forEach(function(w) { if (sugQ.indexOf(w) !== -1) score++; });
      if (score > bestScore) { bestScore = score; bestSug = s; }
    });

    sugs.forEach(function(s) {
      s.classList.remove('sel');
      s.classList.remove('fuzzy-match');
    });

    if (bestSug && bestScore > 0) {
      if (bestScore === 999) {
        bestSug.classList.add('sel');
      } else {
        bestSug.classList.add('fuzzy-match');
      }
    }
  }

  function submitAsk(){
    var val = input.value.trim();
    if (!val) return;

    var result = findBestAnswer(val);
    var matched = result ? result.answer : null;
    var matchedKey = result ? result.key : null;

    // Show user message
    thread.innerHTML = '<div class="msg"><div class="msg-who"><span>you</span><span>just now</span></div><div class="msg-t u">' + val.replace(/</g,'&lt;') + '</div></div>';

    // Highlight closest suggestion button
    if (matchedKey) {
      highlightClosestSuggestion(matchedKey);
    } else {
      sugs.forEach(function(s){ s.classList.remove('sel'); s.classList.remove('fuzzy-match'); });
    }

    // Typing indicator
    var typing = document.createElement('div');
    typing.className = 'typing-row';
    typing.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
    thread.appendChild(typing);

    setTimeout(function(){
      typing.remove();
      var ansDiv = document.createElement('div');
      ansDiv.className = 'msg';

      if (matched) {
        var evHtml = '';
        if (matched.evidence && matched.evidence.length) {
          evHtml = '<div class="ev">';
          matched.evidence.forEach(function(e){
            evHtml += '<div class="ev-i" data-nav="d30-lifecycle"><span class="ev-v">' + e.verb + '</span><span class="ev-o">' + e.obj + '</span><span class="ev-s">' + e.source + '</span><span class="ev-d">' + e.date + '</span></div>';
          });
          evHtml += '</div>';
        }
        ansDiv.innerHTML = '<div class="msg-who"><span>okaeri</span><span>just now</span></div><div class="msg-t">' + matched.text + '</div>' + evHtml;
      } else {
        ansDiv.innerHTML = '<div class="msg-who"><span>okaeri</span><span>just now</span></div><div class="msg-t" style="color:var(--ink3)">I don\'t have enough context to answer that yet. Try one of the suggestions above, or ask about a team member, tool, or meeting.</div>';
      }

      ansDiv.style.opacity = '0';
      ansDiv.style.transition = 'opacity 0.3s ease';
      thread.appendChild(ansDiv);
      requestAnimationFrame(function(){ ansDiv.style.opacity = '1'; });

      // Make evidence rows clickable
      ansDiv.querySelectorAll('.ev-i[data-nav]').forEach(function(row){
        row.addEventListener('click', function(){
          window.OKAERI.activeEvidence = {
            verb: this.querySelector('.ev-v').textContent,
            obj: this.querySelector('.ev-o').textContent,
            source: this.querySelector('.ev-s').textContent,
            date: this.querySelector('.ev-d').textContent
          };
          OKAERI.go(this.getAttribute('data-nav'));
        });
      });
    }, 1400);

    input.value = '';
    sugs.forEach(function(s){ s.style.opacity = '1'; });
  }

  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); submitAsk(); }
  });
  sendBtn.addEventListener('click', submitAsk);
})();
</script>
