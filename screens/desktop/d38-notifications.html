<div class="ptitle">notifications</div>
<div class="hr"></div>

<div id="notifList">
  <div class="notif green" id="notifExec">
    <div class="notif-dot" style="background:var(--green)"></div>
    <div style="flex:1">
      <div style="font-size:9px;font-weight:200;color:var(--green);letter-spacing:.28em;text-transform:uppercase;margin-bottom:4px">executed</div>
      <div class="notif-text" style="font-family:'Courier New',monospace;font-size:11px;color:#3B6D11">API rate limit bug created in Linear <span style="opacity:.6;font-size:10px">· OKA-214</span></div>
    </div>
    <div class="notif-time">just now</div>
    <button class="notif-dismiss" data-dismiss>x</button>
  </div>

  <div class="notif amber" id="notifRisk">
    <div class="notif-dot" style="background:var(--amber)"></div>
    <div style="flex:1">
      <div style="font-size:9px;font-weight:200;color:var(--amber);letter-spacing:.28em;text-transform:uppercase;margin-bottom:4px">at-risk</div>
      <div class="notif-text">Index Ventures outreach overdue — execute now?</div>
      <div style="margin-top:8px"><button class="btn-exec" id="notifExecBtn">execute</button></div>
    </div>
    <div class="notif-time">12 min ago</div>
    <button class="notif-dismiss" data-dismiss>x</button>
  </div>

  <div class="notif" id="notifPrep">
    <div class="notif-dot" style="background:var(--blue)"></div>
    <div style="flex:1">
      <div style="font-size:9px;font-weight:200;color:var(--blue);letter-spacing:.28em;text-transform:uppercase;margin-bottom:4px">meeting prep</div>
      <div class="notif-text">Sequoia meeting in 28 min — prep brief ready</div>
      <div style="margin-top:8px"><button class="btn-ul-g" onclick="OKAERI.go('d08-prep-brief')">open brief</button></div>
    </div>
    <div class="notif-time">2 min ago</div>
    <button class="notif-dismiss" data-dismiss>x</button>
  </div>
</div>

<script>
(function(){
  function dismiss(el){
    if(!el || el.dataset.dismissing) return;
    el.dataset.dismissing = '1';
    el.style.transition = 'opacity 0.3s ease';
    el.style.opacity = '0';
    setTimeout(function(){ el.style.display = 'none'; }, 300);
  }

  // X buttons: all notifications can be dismissed
  document.querySelectorAll('[data-dismiss]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      dismiss(this.closest('.notif'));
    });
  });

  // Play notification sound on load
  if(window.OKAERI && OKAERI.playSound) OKAERI.playSound('notify');

  // Green/executed: auto-dismiss after 4s + click to dismiss
  var exec = document.getElementById('notifExec');
  if(exec){
    exec.style.cursor = 'pointer';
    exec.addEventListener('click', function(){ dismiss(exec); });
    setTimeout(function(){ dismiss(exec); }, 4000);
  }

  function showToast(msg){
    var existing=document.getElementById('okaeri-toast');
    if(existing) existing.remove();
    var t=document.createElement('div');
    t.id='okaeri-toast';
    t.textContent=msg;
    t.style.cssText='position:fixed;bottom:32px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:200;color:var(--green);letter-spacing:.22em;text-transform:uppercase;background:var(--gbg);border:0.5px solid var(--gs);border-radius:6px;padding:8px 16px;opacity:0;transition:opacity 0.3s ease;z-index:9999;pointer-events:none';
    document.body.appendChild(t);
    requestAnimationFrame(function(){ t.style.opacity='1'; });
    setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ t.remove(); },300); },2000);
  }

  // Amber/at-risk: execute button
  var execBtn = document.getElementById('notifExecBtn');
  if(execBtn){
    execBtn.addEventListener('click', function(){
      if(window.OKAERI && OKAERI.playSound) OKAERI.playSound('notify');
      showToast('Index outreach draft started');
      var card = execBtn.closest('.notif');
      if(card){
        card.classList.remove('amber');
        card.classList.add('green');
        card.style.borderColor = 'var(--green)';
        card.style.background = 'var(--gbg)';
      }
      execBtn.textContent = '\u2713 executed';
      execBtn.disabled = true;
      execBtn.style.pointerEvents = 'none';
      execBtn.style.color = 'var(--green)';
      var O = window.OKAERI = window.OKAERI || {};
      O.executedCards = O.executedCards || [];
      O.executedCards.push({verb:'outreach',obj:'Index Ventures',tool:'Email',time:new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}).toLowerCase()});
    });
  }
})();
</script>
