<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okaeri — Interactive Prototype</title>
<link rel="stylesheet" href="styles/system.css">
<style>
html, body { height: 100%; overflow: hidden; }
body { display: flex; background: var(--bg); }

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 0;
  border-right: 0.5px solid var(--rule);
  flex-shrink: 0;
  background: var(--bg);
}
.sidebar::-webkit-scrollbar { width: 2px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--rule2); border-radius: 1px; }

.sidebar-wm {
  font-size: 11px;
  font-weight: 200;
  color: var(--ink);
  letter-spacing: 0.35em;
  padding: 0 20px 18px;
  cursor: pointer;
}

.nav-section { margin-bottom: 4px; }
.nav-section-header {
  font-size: 9px;
  font-weight: 200;
  color: var(--ink3);
  letter-spacing: 0.38em;
  text-transform: uppercase;
  padding: 8px 20px 4px;
  cursor: pointer;
  transition: color 0.15s;
  user-select: none;
}
.nav-section-header:hover { color: var(--ink2); }

.nav-item {
  font-size: 12px;
  font-weight: 200;
  color: var(--ink2);
  letter-spacing: 0.04em;
  padding: 5px 20px 5px 18px;
  cursor: pointer;
  transition: color 0.12s;
  border-left: 1.5px solid transparent;
}
.nav-item:hover { color: var(--ink); }
.nav-item.active {
  color: var(--ink);
  border-left-color: var(--ink);
  font-weight: 300;
}

/* ── Main Area ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; }

/* ── Titlebar ── */
.titlebar {
  background: var(--bg);
  border-bottom: 0.5px solid var(--rule);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.mac-dots { display: flex; gap: 6px; }
.mac-dot { width: 10px; height: 10px; border-radius: 50%; }
.tr { display: flex; align-items: center; gap: 7px; }
.tstat { font-size: 10px; font-weight: 200; color: var(--ink3); letter-spacing: 0.25em; }

/* ── View Toggle ── */
.view-toggle {
  position: absolute;
  top: 12px;
  right: 140px;
  display: flex;
  gap: 0;
  z-index: 10;
}
.view-btn {
  font-size: 9px;
  font-weight: 200;
  color: var(--ink3);
  letter-spacing: 0.18em;
  background: none;
  border: 0.5px solid var(--rule);
  padding: 4px 10px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.view-btn:first-child { border-radius: 3px 0 0 3px; }
.view-btn:last-child { border-radius: 0 3px 3px 0; }
.view-btn:not(:first-child) { border-left: none; }
.view-btn.active { color: var(--ink); border-color: var(--ink); z-index: 1; }

/* ── Screen Content ── */
.main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
}
.screen-content {
  flex: 1;
  padding: 22px 40px;
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 0;
}

/* ── Phone Frame ── */
.phone-wrapper {
  flex: 1;
  display: none;
  align-items: center;
  justify-content: center;
  background: #2a2a28;
  padding: 20px;
}

/* ── Ambient Frame ── */
.ambient-wrapper {
  flex: 1;
  display: none;
  align-items: center;
  justify-content: center;
  background: #2a2a28;
  padding: 40px;
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar"></div>

<!-- Main -->
<div class="main" style="position:relative">

  <!-- View Toggle -->
  <div class="view-toggle">
    <button class="view-btn active" data-view="desktop">desktop</button>
    <button class="view-btn" data-view="mobile">mobile</button>
    <button class="view-btn" data-view="ambient">ambient</button>
  </div>

  <!-- Titlebar -->
  <div class="titlebar">
    <div class="mac-dots">
      <div class="mac-dot" style="background:#FF5F57"></div>
      <div class="mac-dot" style="background:#FEBC2E"></div>
      <div class="mac-dot" style="background:#28C840"></div>
    </div>
    <div class="wm">okaeri</div>
    <div class="tr" id="titleRight">
      <div class="pulse-dot"></div>
      <span class="tstat" id="tstatEl">listening</span>
    </div>
  </div>

  <!-- Desktop Main Panel -->
  <div class="main-panel" id="mainPanel">
    <div class="screen-content" id="screenContent"></div>
  </div>

  <!-- Mobile Phone Frame -->
  <div class="phone-wrapper" id="phoneFrame">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-screen" id="phoneScreenContent"></div>
    </div>
  </div>

  <!-- Ambient Frame -->
  <div class="ambient-wrapper" id="ambientFrame">
    <div class="ambient-surface" id="ambientContent" style="width:100%;max-width:800px"></div>
  </div>

</div>

<script src="data/demo.js"></script>
<script src="components/nav.js"></script>
</body>
</html>
